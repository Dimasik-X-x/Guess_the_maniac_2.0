<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Угадай маньяка · 42 картинки</title>
    <link rel="stylesheet" href="css.css" />
</head>
<body>
    <div class="app">
        <!-- Левая панель -->
        <div class="panel">
            <div class="panel-title">👤 Выбор</div>
            <div class="preview" id="previewContainer">
                <span class="empty">Выберите<br>квадрат</span>
                <img id="previewImage" style="display:none;" alt="Выбранное изображение" />
            </div>
        </div>

        <!-- Правая панель с сеткой -->
        <div class="grid-wrapper">
            <div class="game-title">Угадай маньяка🔪</div>
            <div class="grid" id="gridContainer"></div>
            <div class="bottom-panel">
                <span class="counter" id="counterDisplay">💀 <strong>0</strong> / 42 ✕</span>
                <span class="hint">❌ клик — крест, двойной — перекл.</span>
            </div>
        </div>
    </div>
    <script src="js.js"></script>
</body>
</html>
