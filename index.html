<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Угадай маньяка · 42 картинки</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #3a0a0a 0%, #1a0101 90%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .app {
            display: flex;
            gap: 30px;
            max-width: 100%;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Левая панель */
        .panel {
            background: rgba(60, 10, 10, 0.5);
            backdrop-filter: blur(6px);
            padding: 30px 30px 28px;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(180, 30, 30, 0.3), inset 0 0 60px rgba(120, 0, 0, 0.15);
            border: 1px solid rgba(200, 50, 50, 0.15);
            min-width: 380px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .panel-title {
            color: #ff3a3a;
            font-size: 2.8rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(200, 0, 0, 0.4);
            margin-bottom: 20px;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        .preview {
            width: 320px;
            height: 320px;
            background: #2d0a0a;
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.3);
            border: 2px solid rgba(200, 50, 50, 0.3);
        }

        .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
        }

        .preview .empty {
            color: rgba(255, 180, 180, 0.3);
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            line-height: 1.4;
        }

        /* Правая часть - сетка */
        .grid-wrapper {
            background: rgba(60, 10, 10, 0.5);
            backdrop-filter: blur(6px);
            padding: 30px 30px 28px;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(180, 30, 30, 0.3), inset 0 0 60px rgba(120, 0, 0, 0.15);
            border: 1px solid rgba(200, 50, 50, 0.15);
            max-width: 100%;
            overflow-x: auto;
        }

        .game-title {
            text-align: center;
            font-size: 5.6rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(180deg, #ff1a1a 0%, #8b0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 8px 18px rgba(150, 0, 0, 0.6));
            line-height: 1.2;
            margin: -0.2rem 0 0.8rem 0;
            padding: 0 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            width: fit-content;
            margin: 0 auto;
        }

        .cell {
            width: 255px;
            height: 255px;
            background: #2d0a0a;
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
            box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform 0.1s ease;
        }

        .cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
        }

        .cell .error-placeholder {
            display: none;
            width: 100%;
            height: 100%;
            background: #2d0a0a;
            color: #ff4444;
            font-size: 14px;
            text-align: center;
            align-items: center;
            justify-content: center;
            padding: 10px;
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
        }

        .cell img.error {
            display: none;
        }

        .cell img.error + .error-placeholder {
            display: flex;
        }

        /* Состояние "крестик" — изображение становится более видимым */
        .cell.marked {
            cursor: default;
            opacity: 1;
        }

        .cell.marked img {
            filter: brightness(0.5) saturate(0.8) blur(1px);
            opacity: 0.9;
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        .cell.marked::after {
            content: "✕";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 140px;
            font-weight: 400;
            font-family: 'Times New Roman', 'Segoe UI', serif;
            color: #ff2222;
            text-shadow: 
                0 0 30px rgba(255, 0, 0, 0.9),
                0 0 60px rgba(200, 0, 0, 0.7),
                0 0 100px rgba(150, 0, 0, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            z-index: 5;
            line-height: 1;
        }

        /* Нижняя панель */
        .bottom-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid rgba(180, 40, 40, 0.2);
            padding-top: 16px;
        }

        .counter {
            color: rgba(255, 180, 180, 0.7);
            font-size: 2rem;
            letter-spacing: 2.5px;
            font-weight: 500;
            background: rgba(30, 0, 0, 0.6);
            padding: 12px 32px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(200, 50, 50, 0.25);
            cursor: default;
            box-shadow: inset 0 0 30px rgba(150, 0, 0, 0.1);
            transition: 0.2s;
        }

        .counter strong {
            color: #ff3a3a;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .hint {
            color: rgba(200, 120, 120, 0.4);
            font-size: 1.6rem;
            letter-spacing: 2px;
            background: rgba(20, 0, 0, 0.4);
            padding: 10px 26px;
            border-radius: 40px;
            border: 1px solid rgba(200, 50, 50, 0.1);
            font-weight: 300;
            backdrop-filter: blur(2px);
        }

        /* Адаптивность */
        @media (max-width: 1150px) {
            .grid-wrapper {
                padding: 20px;
            }
            .grid {
                gap: 10px;
            }
            .cell {
                flex-shrink: 0;
            }
        }

        @media (max-width: 700px) {
            .app {
                flex-direction: column;
                align-items: center;
            }
            .panel {
                min-width: unset;
                max-width: unset;
                width: 100%;
                padding: 20px;
            }
            .panel-title {
                font-size: 2.2rem;
                white-space: normal;
            }
            .preview {
                width: 240px;
                height: 240px;
            }
            .preview .empty {
                font-size: 1.4rem;
            }
            .grid-wrapper {
                padding: 16px;
                border-radius: 32px;
            }
            .grid {
                gap: 8px;
            }
            .cell {
                width: 120px;
                height: 120px;
            }
            .cell.marked::after {
                font-size: 68px;
            }
            .game-title {
                font-size: 3.6rem;
                margin-top: 0.1rem;
                margin-bottom: 0.4rem;
                letter-spacing: 4px;
            }
            .bottom-panel {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .counter {
                font-size: 1.4rem;
                padding: 8px 20px;
            }
            .hint {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 440px) {
            .grid {
                gap: 6px;
            }
            .cell {
                width: 72px;
                height: 72px;
            }
            .cell.marked::after {
                font-size: 42px;
            }
            .grid-wrapper {
                padding: 12px;
                border-radius: 24px;
            }
            .game-title {
                font-size: 2.4rem;
                letter-spacing: 2px;
            }
            .counter {
                font-size: 1rem;
                padding: 6px 14px;
            }
            .hint {
                font-size: 0.9rem;
                padding: 4px 12px;
            }
            .panel-title {
                font-size: 1.8rem;
            }
            .preview {
                width: 180px;
                height: 180px;
            }
            .preview .empty {
                font-size: 1.1rem;
            }
        }

        .grid-wrapper::-webkit-scrollbar {
            height: 10px;
            background: rgba(40, 0, 0, 0.3);
            border-radius: 20px;
        }
        .grid-wrapper::-webkit-scrollbar-thumb {
            background: rgba(180, 30, 30, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(200, 50, 50, 0.2);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Левая панель -->
        <div class="panel">
            <div class="panel-title">👤 Ваш выбор</div>
            <div class="preview" id="previewContainer">
                <span class="empty">Выберите<br>квадрат</span>
                <img id="previewImage" style="display:none;" alt="Выбранное изображение" />
            </div>
        </div>

        <!-- Правая панель с сеткой -->
        <div class="grid-wrapper">
            <div class="game-title">Угадай маньяка соперника🔪</div>
            <div class="grid" id="gridContainer"></div>
            <div class="bottom-panel">
                <span class="counter" id="counterDisplay">💀 <strong>0</strong> / 42 ✕</span>
                <span class="hint">❌ клик — крест, двойной клик — переключить</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // Конфигурация
            const TOTAL_CELLS = 42;
            const IMAGE_BASE_PATH = 'Maniac/';
            const IMAGE_EXTENSION = '.png';

            // DOM-элементы
            const gridContainer = document.getElementById('gridContainer');
            const counterDisplay = document.getElementById('counterDisplay');
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('previewImage');
            const emptyText = previewContainer.querySelector('.empty');

            // Состояние
            let markedCount = 0;
            let isFirstClick = true;

            // Генерация списка изображений
            const imageUrls = [];
            for (let i = 1; i <= TOTAL_CELLS; i++) {
                imageUrls.push(IMAGE_BASE_PATH + i + IMAGE_EXTENSION);
            }

            // Обновление счетчика
            function updateCounter() {
                if (counterDisplay) {
                    counterDisplay.innerHTML = `💀 <strong>${markedCount}</strong> / ${TOTAL_CELLS} ✕`;
                }
            }

            // Установка выбранного изображения
            function setSelectedImage(src) {
                if (src && src !== '') {
                    previewImage.src = src;
                    previewImage.style.display = 'block';
                    emptyText.style.display = 'none';
                } else {
                    clearSelectedImage();
                }
            }

            // Очистка выбранного изображения
            function clearSelectedImage() {
                previewImage.style.display = 'none';
                emptyText.style.display = 'block';
                previewImage.src = '';
            }

            // Переключение состояния крестика
            function toggleMark(cell) {
                if (!cell) return;
                
                if (cell.classList.contains('marked')) {
                    cell.classList.remove('marked');
                    markedCount--;
                } else {
                    cell.classList.add('marked');
                    markedCount++;
                }
                
                updateCounter();
                
                if (navigator.vibrate) {
                    navigator.vibrate(10);
                }
            }

            // Сброс всего
            function resetAll() {
                const allCells = document.querySelectorAll('.cell');
                allCells.forEach(cell => {
                    cell.classList.remove('marked');
                });
                markedCount = 0;
                isFirstClick = true;
                clearSelectedImage();
                updateCounter();
                if (navigator.vibrate) {
                    navigator.vibrate(20);
                }
            }

            // Создание ячеек сетки
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;

                // Изображение
                const img = document.createElement('img');
                img.src = imageUrls[i];
                img.alt = `Клетка ${i + 1}`;
                img.loading = 'lazy';

                // Заглушка при ошибке загрузки
                const placeholder = document.createElement('div');
                placeholder.className = 'error-placeholder';
                placeholder.textContent = '⚠️ Изображение не найдено';

                img.addEventListener('error', function() {
                    this.classList.add('error');
                    placeholder.style.display = 'flex';
                });

                img.addEventListener('load', function() {
                    placeholder.style.display = 'none';
                });

                cell.appendChild(img);
                cell.appendChild(placeholder);

                // Обработчик клика
                cell.addEventListener('click', function(e) {
                    // Первый клик — выбор изображения
                    if (isFirstClick) {
                        const imgSrc = this.querySelector('img').src;
                        if (imgSrc && imgSrc !== '') {
                            setSelectedImage(imgSrc);
                        }
                        isFirstClick = false;
                        return;
                    }

                    // Двойной клик — переключение крестика
                    if (e.detail === 2) {
                        toggleMark(this);
                        return;
                    }

                    // Обычный клик — установка крестика (если нет)
                    if (!this.classList.contains('marked')) {
                        this.classList.add('marked');
                        markedCount++;
                        updateCounter();
                        if (navigator.vibrate) {
                            navigator.vibrate(12);
                        }
                    }
                });

                gridContainer.appendChild(cell);
            }

            // Обновление счетчика при старте
            updateCounter();

            // Сброс по двойному клику на счетчике
            if (counterDisplay) {
                counterDisplay.addEventListener('dblclick', resetAll);
                counterDisplay.title = 'Двойной клик — сбросить все крестики и выбор';
            }

        })();
    </script>
</body>
</html>
